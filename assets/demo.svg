<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">いつもの改行 for Excel の動作イメージ</title>
  <desc id="desc">Excelのセル内でEnterキーを押すと、Alt+Enterの代わりにセル内改行されることを示す説明画像。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1f2937" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M2 2 L12 7 L2 12 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="#f4f7fb"/>
  <rect x="56" y="54" width="1088" height="567" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="56" y="54" width="1088" height="58" rx="18" fill="#0f766e"/>
  <path d="M56 94 H1144 V112 H56 Z" fill="#0f766e"/>
  <circle cx="89" cy="83" r="8" fill="#fecaca"/>
  <circle cx="115" cy="83" r="8" fill="#fde68a"/>
  <circle cx="141" cy="83" r="8" fill="#bbf7d0"/>
  <text x="174" y="91" fill="#ffffff" font-size="22" font-weight="700" font-family="Meiryo, Yu Gothic, Arial, sans-serif">いつもの改行 for Excel</text>

  <rect x="92" y="142" width="728" height="408" rx="10" fill="#f8fafc" stroke="#d1d5db"/>
  <rect x="92" y="142" width="728" height="42" rx="10" fill="#e5e7eb"/>
  <path d="M92 174 H820 V184 H92 Z" fill="#e5e7eb"/>
  <text x="124" y="170" fill="#374151" font-size="17" font-weight="700" font-family="Meiryo, Yu Gothic, Arial, sans-serif">Excel</text>

  <g font-family="Meiryo, Yu Gothic, Arial, sans-serif" font-size="16" fill="#6b7280">
    <text x="128" y="224">A</text>
    <text x="278" y="224">B</text>
    <text x="428" y="224">C</text>
    <text x="578" y="224">D</text>
    <text x="728" y="224">E</text>
  </g>
  <g stroke="#cbd5e1" stroke-width="1">
    <path d="M116 238 H790"/>
    <path d="M116 298 H790"/>
    <path d="M116 358 H790"/>
    <path d="M116 418 H790"/>
    <path d="M116 478 H790"/>
    <path d="M116 538 H790"/>
    <path d="M116 238 V538"/>
    <path d="M250 238 V538"/>
    <path d="M384 238 V538"/>
    <path d="M518 238 V538"/>
    <path d="M652 238 V538"/>
    <path d="M790 238 V538"/>
  </g>
  <rect x="250" y="298" width="134" height="120" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
  <text x="270" y="340" fill="#14532d" font-size="22" font-weight="700" font-family="Meiryo, Yu Gothic, Arial, sans-serif">1行目</text>
  <text x="270" y="382" fill="#14532d" font-size="22" font-weight="700" font-family="Meiryo, Yu Gothic, Arial, sans-serif">2行目</text>
  <text x="132" y="274" fill="#334155" font-size="18" font-family="Meiryo, Yu Gothic, Arial, sans-serif">セル内で文章入力中</text>
  <text x="538" y="392" fill="#334155" font-size="18" font-family="Meiryo, Yu Gothic, Arial, sans-serif">図形・テキストボックスでは変換しません</text>

  <rect x="858" y="170" width="248" height="86" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="982" y="206" text-anchor="middle" fill="#1e3a8a" font-size="20" font-weight="700" font-family="Meiryo, Yu Gothic, Arial, sans-serif">Enter</text>
  <text x="982" y="235" text-anchor="middle" fill="#1d4ed8" font-size="16" font-family="Meiryo, Yu Gothic, Arial, sans-serif">いつものキーでOK</text>

  <path d="M936 272 C872 332 780 346 676 354" fill="none" stroke="#2563eb" stroke-width="6" marker-end="url(#arrow)"/>
  <rect x="850" y="376" width="270" height="118" rx="20" fill="#ecfdf5" stroke="#86efac"/>
  <text x="985" y="414" text-anchor="middle" fill="#14532d" font-size="22" font-weight="700" font-family="Meiryo, Yu Gothic, Arial, sans-serif">Alt + Enter に変換</text>
  <text x="985" y="448" text-anchor="middle" fill="#166534" font-size="17" font-family="Meiryo, Yu Gothic, Arial, sans-serif">Excelのセル内だけ</text>
  <text x="985" y="476" text-anchor="middle" fill="#166534" font-size="17" font-family="Meiryo, Yu Gothic, Arial, sans-serif">セル内改行できます</text>

  <rect x="120" y="574" width="960" height="30" rx="15" fill="#e0f2fe"/>
  <text x="600" y="596" text-anchor="middle" fill="#075985" font-size="17" font-weight="700" font-family="Meiryo, Yu Gothic, Arial, sans-serif">Enter / Shift + Enter を、Excelのセル内改行として使える常駐アプリ</text>
</svg>
